version: 2.1
orbs:
  kazoo: official-2600hz/kazoo@0.4.1
filters:
  tags:
    only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
  branches:
    ignore: '/.*/'
parameters:
  otp-version:
    type: string
    default: 26.2.5
workflows:
  version: 2
  build_branch:
    jobs:
      -
        kazoo/build-preparation:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          platform: '<< matrix.platform >>'
          name: 'preparation-<< matrix.platform >>'
          target-type: kapp
          matrix:
            parameters:
              platform: [centos-7, rockylinux-8, rockylinux-9]
      -
        kazoo/build:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          platform: '<< matrix.platform >>'
          name: 'beams-<< matrix.platform >>'
          matrix:
            parameters:
              platform: [centos-7, rockylinux-8, rockylinux-9]
          requires:
            - 'preparation-<< matrix.platform >>'
      -
        kazoo/eunit-tests:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - preparation-rockylinux-9
      -
        kazoo/code-checks:
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - beams-rockylinux-9
      -
        kazoo/docs:
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - beams-rockylinux-9
      -
        kazoo/analyze:
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - beams-rockylinux-9
      -
        kazoo/integration-test:
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - beams-rockylinux-9
      -
        kazoo/build-centos7:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          target-type: kapp
          requires:
            - beams-centos-7
      -
        kazoo/build-rockylinux8:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          target-type: kapp
          requires:
            - beams-rockylinux-8
      -
        kazoo/build-rockylinux9:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          target-type: kapp
          requires:
            - beams-rockylinux-9
  build_release:
    jobs:
      -
        kazoo/build-preparation:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          platform: '<< matrix.platform >>'
          name: 'preparation-<< matrix.platform >>'
          target-type: kapp
          matrix:
            parameters:
              platform: [centos-7, rockylinux-8, rockylinux-9]
          for-packager: 'true'
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/build:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          platform: '<< matrix.platform >>'
          name: 'beams-<< matrix.platform >>'
          matrix:
            parameters:
              platform: [centos-7, rockylinux-8, rockylinux-9]
          requires:
            - 'preparation-<< matrix.platform >>'
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/eunit-tests:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - preparation-rockylinux-9
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/code-checks:
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - beams-rockylinux-9
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/docs:
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - beams-rockylinux-9
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/analyze:
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - beams-rockylinux-9
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/integration-test:
          otp-version: '<< pipeline.parameters.otp-version >>'
          requires:
            - beams-rockylinux-9
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/build-centos7:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          target-type: kapp
          requires:
            - beams-centos-7
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/build-rockylinux8:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          target-type: kapp
          requires:
            - beams-rockylinux-8
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
      -
        kazoo/build-rockylinux9:
          context: Private-Builds
          otp-version: '<< pipeline.parameters.otp-version >>'
          target-type: kapp
          requires:
            - beams-rockylinux-9
          filters:
            tags:
              only: '/^\d+\.\d+\.\d+(\.\d+)?$/'
            branches:
              ignore: '/.*/'
